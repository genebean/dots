repos:
  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt
        entry: nix
        language: system
        types: [nix]
        pass_filenames: false
        args: ["fmt"]

      - id: deadnix
        name: deadnix
        entry: deadnix
        language: system
        types: [nix]
        args: ["./modules", "./lib"]

      - id: statix
        name: statix
        entry: statix
        language: system
        types: [nix]
        pass_filenames: false
        args: ["check", "."]

      - id: check-restic-prune-singleton
        name: check-restic-prune-singleton
        entry: scripts/check-restic-prune-singleton.sh
        language: system
        files: ^modules/hosts/.*\.nix$
        pass_filenames: false

